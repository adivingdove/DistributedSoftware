version: '3.8'

services:
  mysql-master:
    image: mysql:8.0
    container_name: seckill-mysql-master
    environment:
      MYSQL_ROOT_PASSWORD: minatoaqua3710
      MYSQL_DATABASE: inventory_seckill
    ports:
      - "3307:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./mysql/master.cnf:/etc/mysql/conf.d/master.cnf
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pminatoaqua3710"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - seckill-net

  mysql-slave:
    image: mysql:8.0
    container_name: seckill-mysql-slave
    environment:
      MYSQL_ROOT_PASSWORD: minatoaqua3710
      MYSQL_DATABASE: inventory_seckill
    ports:
      - "3308:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf
      - ./mysql/init-slave.sh:/docker-entrypoint-initdb.d/init-slave.sh
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/00-init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pminatoaqua3710"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - seckill-net

  mysql-shard0:
    image: mysql:8.0
    container_name: seckill-mysql-shard0
    environment:
      MYSQL_ROOT_PASSWORD: minatoaqua3710
    ports:
      - "3309:3306"
    volumes:
      - mysql-shard0-data:/var/lib/mysql
      - ./mysql/init-shard-0.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --server-id=3
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pminatoaqua3710"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - seckill-net

  mysql-shard1:
    image: mysql:8.0
    container_name: seckill-mysql-shard1
    environment:
      MYSQL_ROOT_PASSWORD: minatoaqua3710
    ports:
      - "3310:3306"
    volumes:
      - mysql-shard1-data:/var/lib/mysql
      - ./mysql/init-shard-1.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --server-id=4
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pminatoaqua3710"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - seckill-net

  redis:
    image: redis:7-alpine
    container_name: seckill-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - seckill-net

  elasticsearch:
    image: elasticsearch:7.17.16
    container_name: seckill-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks:
      - seckill-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: seckill-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD", "echo", "ruok", "|", "nc", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seckill-net

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: seckill-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - seckill-net

  app1:
    build: .
    container_name: seckill-app1
    environment:
      SERVER_PORT: 8081
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT: 3306
      MYSQL_SLAVE_HOST: mysql-slave
      MYSQL_SLAVE_PORT: 3306
      MYSQL_SHARD0_HOST: mysql-shard0
      MYSQL_SHARD0_PORT: 3306
      MYSQL_SHARD1_HOST: mysql-shard1
      MYSQL_SHARD1_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: minatoaqua3710
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_HOST: elasticsearch
      ES_PORT: 9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SNOWFLAKE_WORKER_ID: 1
      SNOWFLAKE_DATACENTER_ID: 1
    ports:
      - "8081:8081"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-shard0:
        condition: service_healthy
      mysql-shard1:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - seckill-net

  app2:
    build: .
    container_name: seckill-app2
    environment:
      SERVER_PORT: 8082
      MYSQL_MASTER_HOST: mysql-master
      MYSQL_MASTER_PORT: 3306
      MYSQL_SLAVE_HOST: mysql-slave
      MYSQL_SLAVE_PORT: 3306
      MYSQL_SHARD0_HOST: mysql-shard0
      MYSQL_SHARD0_PORT: 3306
      MYSQL_SHARD1_HOST: mysql-shard1
      MYSQL_SHARD1_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: minatoaqua3710
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ES_HOST: elasticsearch
      ES_PORT: 9200
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SNOWFLAKE_WORKER_ID: 2
      SNOWFLAKE_DATACENTER_ID: 1
    ports:
      - "8082:8082"
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      mysql-shard0:
        condition: service_healthy
      mysql-shard1:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - seckill-net

  nginx:
    image: nginx:alpine
    container_name: seckill-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/usr/share/nginx/html
    depends_on:
      - app1
      - app2
    networks:
      - seckill-net

volumes:
  mysql-master-data:
  mysql-slave-data:
  mysql-shard0-data:
  mysql-shard1-data:
  redis-data:
  es-data:

networks:
  seckill-net:
    driver: bridge
